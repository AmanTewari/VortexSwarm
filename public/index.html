<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VortexSwarm Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">VORTEXSWARM</p>
          <h1>Swarm Control Panel</h1>
        </div>
        <button id="themeToggle" class="btn ghost" type="button">Switch Theme</button>
      </header>

      <section class="kpi-row">
        <article class="kpi">
          <span class="kpi-label">Server</span>
          <strong id="server">-</strong>
        </article>
        <article class="kpi">
          <span class="kpi-label">Configured Bots</span>
          <strong id="configuredBots">0</strong>
        </article>
        <article class="kpi">
          <span class="kpi-label">Connected Bots</span>
          <strong id="connectedBots">0</strong>
        </article>
        <article class="kpi">
          <span class="kpi-label">Join Delay</span>
          <strong id="joinDelay">0ms</strong>
        </article>
        <article class="kpi">
          <span class="kpi-label">Auth Mode</span>
          <strong id="authModeBadge">MICROSOFT</strong>
        </article>
        <article class="kpi">
          <span class="kpi-label">Swarm Status</span>
          <strong id="swarmStatus">STOPPED</strong>
        </article>
        <article class="kpi">
          <span class="kpi-label">Backend</span>
          <strong id="backendStatus">OFFLINE</strong>
        </article>
      </section>

      <section class="panel-row">
        <article class="panel controls">
          <h2>Broadcast Command</h2>
          <form id="commandForm" class="command-form">
            <input id="commandInput" name="commandInput" type="text" placeholder="come | spam hello | attack Steve | status" autocomplete="off" required />
            <button class="btn" type="submit">Run</button>
          </form>

          <div class="quick-actions">
            <button id="startAll" class="btn" type="button">Start Swarm</button>
            <button class="btn ghost" data-cmd="come">come</button>
            <button class="btn ghost" data-cmd="status">status</button>
            <button class="btn ghost" data-cmd="attack zombie">attack zombie</button>
            <button id="stopAll" class="btn danger" type="button">Stop Swarm</button>
          </div>

          <section class="server-panel">
            <h3>Server Settings</h3>
            <form id="serverConfigForm" class="server-form">
              <label for="serverHost">Host</label>
              <input id="serverHost" name="serverHost" type="text" placeholder="localhost" required />

              <label for="serverPort">Port</label>
              <input id="serverPort" name="serverPort" type="number" min="1" max="65535" placeholder="25565" required />

              <label for="serverVersion">Version</label>
              <input id="serverVersion" name="serverVersion" type="text" placeholder="auto" />

              <label for="joinDelayMs">Join Delay (ms)</label>
              <input id="joinDelayMs" name="joinDelayMs" type="number" min="0" max="120000" placeholder="2000" required />

              <label for="botCount">Bot Count</label>
              <input id="botCount" name="botCount" type="number" min="1" step="1" placeholder="5" required />

              <button class="btn" type="submit">Apply & Restart</button>
            </form>
          </section>

          <fieldset class="mode-toggle">
            <legend>Authentication Mode</legend>
            <label class="mode-option" for="modeMicrosoft">
              <input type="radio" id="modeMicrosoft" name="authMode" value="microsoft" checked />
              <span>Microsoft</span>
            </label>
            <label class="mode-option" for="modeOffline">
              <input type="radio" id="modeOffline" name="authMode" value="offline" />
              <span>Offline</span>
            </label>

            <div class="offline-style-wrap">
              <label for="offlineNameStyle">Offline Name Style</label>
              <select id="offlineNameStyle" name="offlineNameStyle">
                <option value="gaming">Gaming (DoggyGamer2331)</option>
                <option value="human">Human (TomFelton / Tom_Felton)</option>
                <option value="mixed">Mixed</option>
              </select>
              <button id="saveNames" class="btn ghost" type="button">Save Names</button>
            </div>
          </fieldset>

          <section class="saved-names-panel">
            <h3>Saved Names</h3>
            <div id="savedNamesList" class="saved-names-list"></div>
          </section>

          <section class="saved-names-panel">
            <h3>Current Offline Names</h3>
            <div id="currentOfflineNamesList" class="saved-names-list"></div>
          </section>

          <p id="feedback" class="feedback"></p>
        </article>

        <article class="panel logs">
          <h2>Live Logs</h2>
          <div id="logFeed" class="log-feed" aria-live="polite"></div>
        </article>
      </section>

      <section class="panel">
        <h2>Bot Fleet</h2>
        <div id="botGrid" class="bot-grid"></div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
